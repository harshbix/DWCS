<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .pulse-marker::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background-color: theme('colors.primary-container');
            z-index: -1;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes slide-up {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Simulated Route Line Pattern */
        .route-line {
            background-image: radial-gradient(circle at center, theme('colors.primary') 3px, transparent 4px);
            background-size: 16px 16px;
            background-position: center;
        }
    </style>
</head>
<body class="bg-surface relative h-screen w-screen overflow-hidden antialiased">
