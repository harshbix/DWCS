<body class="bg-background text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">

</div>
<h1 class="font-headline-md text-headline-md-mobile text-primary dark:text-primary-fixed dark:text-on-surface font-bold tracking-tight">Dar es Salaam, TZ</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-[88px] pb-[100px] px-container-margin md:px-0 md:max-w-md md:mx-auto w-full">
<div class="py-stack-lg">
<h2 class="font-display-lg text-display-lg text-on-surface mb-2">Report an Issue</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Help us keep the community clean. Your report will be sent to the local waste management team.</p>
</div>
<!-- Issue Form -->
<form class="flex flex-col gap-stack-lg mb-stack-lg">
<!-- Issue Type -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="issue-type">Issue Type</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#0071E3] focus:ring-1 focus:ring-[#0071E3] transition-colors shadow-sm" id="issue-type">
<option disabled="" selected="" value="">Select an issue category</option>
<option value="dumping">Illegal Dumping</option>
<option value="missed">Missed Collection</option>
<option value="full">Full Bin</option>
<option value="other">Other</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Photo Upload -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface">Photo (Optional)</label>
<button class="w-full h-32 border-2 border-dashed border-outline-variant rounded-lg flex flex-col items-center justify-center gap-2 bg-surface-container-lowest hover:bg-surface-container-low transition-colors group" type="button">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-primary-container group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Tap to upload a photo</span>
</button>
</div>
<!-- Location -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="location">Location</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined">location_on</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none shadow-sm cursor-not-allowed opacity-80" id="location" readonly="" type="text" value="Kariakoo Market, Dar es Salaam">
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="description">Description</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#0071E3] focus:ring-1 focus:ring-[#0071E3] transition-colors shadow-sm resize-none" id="description" placeholder="Provide more details about the issue..." rows="4"></textarea>
</div>
<!-- Submit Action -->
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md py-4 rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span>Submit Report</span>
<span class="material-symbols-outlined text-[20px]">send</span>
</button><button class="w-full bg-surface-container-high text-on-surface font-label-md text-label-md py-4 rounded-xl shadow-sm hover:bg-surface-container-highest active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2" type="button">
  <span class="">View History</span>
  <span class="material-symbols-outlined text-[20px]">history</span>
</button>
</form>
<!-- Divider -->

<!-- Recent Reports List -->

</main>

</a>

</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-outline-variant/60 gap-1 hover:text-primary transition-all duration-300 w-16 group" href="#">
<span class="material-symbols-outlined text-[24px] group-hover:scale-110 transition-transform">analytics</span>
<span class="font-label-md text-[10px] leading-tight font-medium">Reports</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant/60 dark:text-outline-variant/60 gap-1 hover:text-primary transition-all duration-300 w-16 group" href="#">
