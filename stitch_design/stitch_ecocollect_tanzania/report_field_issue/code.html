<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Issue Report</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "tertiary-container": "#4d6553",
                    "on-secondary-fixed": "#002114",
                    "on-primary-container": "#a8e7c5",
                    "surface-variant": "#dce3ec",
                    "surface-dim": "#d4dbe3",
                    "inverse-primary": "#95d4b3",
                    "primary": "#0f5238",
                    "tertiary": "#364d3c",
                    "on-background": "#151c22",
                    "on-tertiary-container": "#c6e1ca",
                    "on-error": "#ffffff",
                    "on-secondary-container": "#436b58",
                    "inverse-surface": "#2a3138",
                    "surface-container-low": "#eef4fd",
                    "secondary-fixed": "#c1ecd4",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed-variant": "#354c3b",
                    "primary-container": "#2d6a4f",
                    "tertiary-fixed": "#cee9d3",
                    "secondary-fixed-dim": "#a5d0b9",
                    "on-error-container": "#93000a",
                    "surface-container": "#e8eef7",
                    "primary-fixed-dim": "#95d4b3",
                    "on-primary-fixed": "#002114",
                    "secondary-container": "#beead1",
                    "outline": "#707973",
                    "on-primary-fixed-variant": "#0e5138",
                    "on-secondary": "#ffffff",
                    "error": "#ba1a1a",
                    "surface": "#f6f9ff",
                    "inverse-on-surface": "#ebf1fa",
                    "on-tertiary": "#ffffff",
                    "surface-bright": "#f6f9ff",
                    "on-secondary-fixed-variant": "#274e3d",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#404943",
                    "tertiary-fixed-dim": "#b3cdb7",
                    "surface-tint": "#2c694e",
                    "background": "#f6f9ff",
                    "primary-fixed": "#b1f0ce",
                    "on-tertiary-fixed": "#092012",
                    "secondary": "#3f6653",
                    "surface-container-highest": "#dce3ec",
                    "surface-container-high": "#e2e9f1",
                    "on-surface": "#151c22",
                    "outline-variant": "#bfc9c1"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "touch-target-min": "44px",
                    "edge-margin": "16px",
                    "lg": "24px",
                    "md": "16px",
                    "sm": "8px",
                    "xl": "32px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "headline-sm": ["Plus Jakarta Sans"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "headline-md-mobile": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "label-bold": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-sm": ["20px", {"lineHeight": "26px", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "headline-md-mobile": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "30px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "22px", "fontWeight": "400"}],
                    "label-bold": ["14px", {"lineHeight": "18px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "24px", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            /* Prevent overscroll on mobile */
            overscroll-behavior-y: none;
        }
        /* Custom scrollbar hiding if needed for tiny screens */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-full overflow-hidden flex flex-col font-body-md text-body-md antialiased">
<!-- TopAppBar JSON Source -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md border-b border-outline-variant/30 dark:border-outline/30 flex justify-between items-center h-14 px-md">
<div class="flex items-center gap-sm">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-highest/50 dark:hover:bg-surface-container-high/50 transition-colors active:scale-95 duration-100 text-on-surface-variant dark:text-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<span class="font-headline-sm text-headline-sm-mobile md:text-headline-sm text-primary dark:text-inverse-primary">Report Issue</span>
</div>
<div class="flex items-center">
<!-- Trailing action suppressed for clarity in transactional view -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto mt-14 mb-20 px-md py-md flex flex-col gap-lg pb-[100px]">
<!-- Category Grid -->
<section class="flex flex-col gap-sm">
<h2 class="font-label-bold text-label-bold text-on-surface-variant">Select Issue Type</h2>
<div class="grid grid-cols-2 gap-sm">
<!-- Breakdown -->
<button class="group relative bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-md flex flex-col items-center justify-center gap-sm min-h-[100px] hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent active:border-l-4 active:border-l-primary active:scale-95 duration-100" type="button">
<span class="material-symbols-outlined text-primary group-active:text-primary-container text-[32px]" style="font-variation-settings: 'FILL' 1;">car_crash</span>
<span class="font-label-bold text-label-bold text-on-surface">Breakdown</span>
</button>
<!-- Blocked Road -->
<button class="group relative bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-md flex flex-col items-center justify-center gap-sm min-h-[100px] hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent active:border-l-4 active:border-l-primary active:scale-95 duration-100" type="button">
<span class="material-symbols-outlined text-primary group-active:text-primary-container text-[32px]" style="font-variation-settings: 'FILL' 1;">construction</span>
<span class="font-label-bold text-label-bold text-on-surface">Blocked Road</span>
</button>
<!-- Hazard -->
<button class="group relative bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-md flex flex-col items-center justify-center gap-sm min-h-[100px] hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent active:border-l-4 active:border-l-primary active:scale-95 duration-100" type="button">
<span class="material-symbols-outlined text-primary group-active:text-primary-container text-[32px]" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="font-label-bold text-label-bold text-on-surface">Hazard</span>
</button>
<!-- Other -->
<button class="group relative bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-md flex flex-col items-center justify-center gap-sm min-h-[100px] hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent active:border-l-4 active:border-l-primary active:scale-95 duration-100" type="button">
<span class="material-symbols-outlined text-primary group-active:text-primary-container text-[32px]" style="font-variation-settings: 'FILL' 1;">more_horiz</span>
<span class="font-label-bold text-label-bold text-on-surface">Other</span>
</button>
</div>
</section>
<!-- Description Field -->
<section class="flex flex-col gap-sm">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="description">Short Description</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-md font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent placeholder:text-on-surface-variant/50 resize-none min-h-[56px]" id="description" placeholder="Briefly describe the situation..." rows="3"></textarea>
</section>
<!-- Add Photo -->
<section>
<button class="w-full bg-surface-container-low border border-outline-variant/50 border-dashed rounded-xl p-md flex flex-col items-center justify-center gap-sm min-h-[80px] hover:bg-surface-container transition-colors active:scale-[0.98] duration-100 text-primary" type="button">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 0;">photo_camera</span>
<span class="font-label-bold text-label-bold">Add Photo</span>
</button>
</section>
<!-- Location Status -->
<section class="bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-sm flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="flex flex-col">
<span class="font-label-bold text-label-bold text-on-surface">Location Acquired</span>
<span class="font-label-sm text-label-sm text-on-surface-variant font-mono">40.7128° N, 74.0060° W</span>
</div>
</section>
</main>
<!-- Bottom Action Area (Pinned) -->
<!-- Suppressing standard BottomNavBar as this is a transactional flow -->
<div class="fixed bottom-0 w-full z-50 bg-surface/90 backdrop-blur-md border-t border-outline-variant/30 px-md py-sm pb-[env(safe-area-inset-bottom,16px)] shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<button class="w-full h-[56px] min-h-[touch-target-min] bg-primary text-on-primary rounded-full font-label-bold text-label-bold flex items-center justify-center gap-sm active:scale-[0.98] transition-transform duration-100 shadow-md" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
            Submit Report
        </button>
</div>
<script>
        // Simple interaction for the grid buttons to show active state
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                // If it's a category button
                if(this.closest('.grid')) {
                    // Reset all
                    document.querySelectorAll('.grid button').forEach(b => {
                        b.classList.remove('border-l-4', 'border-l-primary', 'bg-surface-container-low');
                    });
                    // Set active
                    this.classList.add('border-l-4', 'border-l-primary', 'bg-surface-container-low');
                }
            });
        });
    </script>
</body></html>
